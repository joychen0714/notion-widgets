<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個人資產儀表板</title>
  <style>
    body { margin: 0; font-family: system-ui, "Microsoft JhengHei", sans-serif; background: #f4f8fb; color: #142033; }
    .wrap { width: min(960px, calc(100vw - 32px)); margin: 48px auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    a { display: block; padding: 20px; border: 1px solid #dfe6ee; border-radius: 8px; background: #fff; color: inherit; text-decoration: none; box-shadow: 0 12px 28px rgba(20,32,51,.08); }
    strong { display: block; font-size: 22px; margin-bottom: 8px; }
    span { color: #667485; }
    h1 { font-size: 32px; margin: 0 0 20px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>個人資產儀表板</h1>
    <section class="grid">
      <a href="./v1/"><strong>V1</strong><span>側欄版個人資產儀表板</span></a>
      <a href="./v2/"><strong>V2</strong><span>橫向導覽版個人資產儀表板</span></a>
      <a href="./v3/"><strong>V3</strong><span>第 3 模板個人資產儀表板</span></a>
    </section>
  </main>
</body>
</html>
